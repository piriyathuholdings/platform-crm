services:
  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crm}
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-crm} -d ${POSTGRES_DB:-crm}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./fastapi-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?Set JWT_SECRET_KEY}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
    expose:
      - "9000"

  web:
    build:
      context: ./piriyathu-crm-next
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    environment:
      FRAPPE_BASE_URL: http://api:9000
      NEXTJS_ORIGIN: ${NEXTJS_ORIGIN:-https://crm.piriyathu.com}
      ACCESS_COOKIE_NAME: ${ACCESS_COOKIE_NAME:-crm_access_token}
      NODE_ENV: production
    ports:
      - "3000:3000"

volumes:
  postgres_data:
